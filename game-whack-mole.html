<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>瘋狂打地鼠 - 詞語辨識</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            background-color: #e8f5e9;
            color: #333;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: manipulation; /* 防止連點放大螢幕 */
        }
        h1 { color: #2e7d32; font-size: 1.8rem; margin-bottom: 5px; text-align: center; }
        
        /* 老師設定畫面 */
        #setup-view {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        .instruction { font-size: 1rem; color: #555; margin-bottom: 15px; line-height: 1.6; }
        textarea {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-family: inherit;
            border: 2px solid #81c784;
            border-radius: 8px;
            margin-bottom: 15px;
            resize: vertical;
            box-sizing: border-box;
        }
        .btn-main {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px #388e3c;
            transition: all 0.2s;
            font-weight: bold;
            display: block;
            margin: 0 auto;
        }
        .btn-main:active { box-shadow: 0 0 #388e3c; transform: translateY(4px); }
        .error-msg { color: #d32f2f; font-weight: bold; margin-top: 10px; display: none; text-align: center;}

        /* 遊戲畫面 */
        #game-view { display: none; width: 100%; max-width: 700px; flex-direction: column; align-items: center; }
        .top-bar { display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; align-items: center;}
        .btn-back { background-color: #9e9e9e; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold;}
        
        .stats-board {
            display: flex;
            gap: 15px;
        }
        .stat-box {
            background: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .score-text { color: #f57c00; }
        .time-text { color: #d32f2f; }

        /* 題目提示區 */
        #clue-display {
            background-color: #fffde7;
            border: 3px dashed #fbc02d;
            padding: 15px 20px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-size: 1.3rem;
            font-weight: bold;
            color: #424242;
            margin-bottom: 20px;
            box-sizing: border-box;
            min-height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 打地鼠網格 */
        #game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            background-color: #8d6e63;
            padding: 20px;
            border-radius: 15px;
            box-sizing: border-box;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.3);
        }

        /* 地洞與地鼠 */
        .hole {
            width: 100%;
            aspect-ratio: 1 / 1;
            background-color: #3e2723;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.8), 0 2px 0 #bcaaa4;
        }

        .mole {
            position: absolute;
            width: 80%;
            height: 90%;
            bottom: -100%; /* 初始隱藏在洞裡 */
            left: 10%;
            background-color: #ffb74d;
            border-radius: 40px 40px 10px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-weight: bold;
            font-size: 1.3rem;
            color: #fff;
            cursor: pointer;
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 -5px 0 #f57c00;
            user-select: none;
            padding: 5px;
            box-sizing: border-box;
            line-height: 1.2;
        }

        /* 確保字數多時也能顯示 */
        .mole span { pointer-events: none; } 

        .mole.up { bottom: 5%; } /* 地鼠冒出來 */
        
        .mole.hit-correct { background-color: #4caf50; box-shadow: inset 0 -5px 0 #388e3c; bottom: -100%; transition: bottom 0.1s, background-color 0.1s; }
        .mole.hit-wrong { background-color: #f44336; box-shadow: inset 0 -5px 0 #d32f2f; animation: shake 0.3s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25%, 75% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
        }

        /* 開始按鈕覆蓋層 */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .start-modal {
            background: #fff; padding: 30px; border-radius: 12px; text-align: center;
        }

        @media (max-width: 500px) {
            .mole { font-size: 1.1rem; }
            #clue-display { font-size: 1.1rem; padding: 10px; }
        }
        /* 🌟 新增：返回遊戲大廳按鈕樣式 */
        .back-to-lobby {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffffff;
            color: #333333;
            padding: 8px 16px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 0 #cbd5e1, 0 4px 10px rgba(0,0,0,0.08);
            border: 2px solid #cbd5e1;
            transition: all 0.1s ease;
            z-index: 9999;
        }
        .back-to-lobby:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #cbd5e1, 0 6px 12px rgba(0,0,0,0.12);
        }
        .back-to-lobby:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #cbd5e1, 0 2px 5px rgba(0,0,0,0.05);
        }
        @media (max-width: 600px) {
            .back-to-lobby {
                top: 10px;
                right: 10px;
                padding: 6px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<a href="./index.html" class="back-to-lobby">🏠 返回遊戲大廳</a>
    <div id="setup-view">
        <h1>🐹 瘋狂打地鼠生成器 🐹</h1>
        <div class="instruction">
            <strong>使用說明：</strong><br>
            請輸入要溫習的詞語和解釋（用冒號或橫線分隔）。<br>
            系統會自動將它們轉換為「打地鼠」遊戲。上方會顯示解釋，學生必須在多隻彈出的地鼠中，擊中拿著正確詞語的那一隻！<br>
            <small style="color: #d84315;">* 請至少輸入 4 組詞語，以便系統產生足夠的干擾選項。</small>
        </div>
        <textarea id="word-input" rows="8">
頭腦：人類思考的器官。
交叉：兩條線條互相穿過。
啟事：公開發布的公告文字。
優先：比其他事物排前處理。
底氣：做事的信心和憑藉。
動搖：意志不堅定或改變。
篩選：挑選出符合要求的。
預感：事先感覺將發生的事。</textarea>
        
        <div style="margin-bottom: 15px; text-align: center;">
            <label style="font-weight: bold; color: #555;">遊戲時間：</label>
            <select id="time-limit" style="padding: 5px; font-size: 1rem; border-radius: 5px;">
                <option value="30">30 秒 (極速挑戰)</option>
                <option value="60" selected>60 秒 (標準模式)</option>
                <option value="120">120 秒 (持久戰)</option>
            </select>
        </div>

        <button class="btn-main" onclick="prepareGame()">✨ 產生打地鼠遊戲 ✨</button>
        <div id="error-msg" class="error-msg"></div>
    </div>

    <div id="game-view">
        <div class="top-bar">
            <button class="btn-back" onclick="backToSetup()">🔙 結束遊戲</button>
            <div class="stats-board">
                <div class="stat-box score-text">得分: <span id="score">0</span></div>
                <div class="stat-box time-text">時間: <span id="time">60</span>s</div>
            </div>
        </div>

        <div id="clue-display">準備好迎接挑戰了嗎？</div>

        <div id="game-board">
            <div class="hole"><div class="mole" id="mole-0" onmousedown="whack(0)" ontouchstart="whack(0)"></div></div>
            <div class="hole"><div class="mole" id="mole-1" onmousedown="whack(1)" ontouchstart="whack(1)"></div></div>
            <div class="hole"><div class="mole" id="mole-2" onmousedown="whack(2)" ontouchstart="whack(2)"></div></div>
            <div class="hole"><div class="mole" id="mole-3" onmousedown="whack(3)" ontouchstart="whack(3)"></div></div>
            <div class="hole"><div class="mole" id="mole-4" onmousedown="whack(4)" ontouchstart="whack(4)"></div></div>
            <div class="hole"><div class="mole" id="mole-5" onmousedown="whack(5)" ontouchstart="whack(5)"></div></div>
        </div>
    </div>

    <div id="start-overlay">
        <div class="start-modal">
            <h2 id="modal-title" style="color: #2e7d32; margin-top: 0;">準備開始！</h2>
            <p id="modal-desc" style="font-size: 1.1rem; color: #555;">看清楚上方的解釋，打擊對應的詞語地鼠！<br>打對 +10 分，打錯 -5 分。</p>
            <button class="btn-main" id="start-btn" onclick="startGame()">開始遊戲</button>
        </div>
    </div>

    <script>
        let wordData = [];
        let score = 0;
        let timeLeft = 60;
        let gameTimer = null;
        let moleTimer = null;
        let isPlaying = false;
        
        let currentTarget = null; // 當前正確的詞語物件
        let activeMoles = []; // 當前冒出來的地洞索引
        
        const totalHoles = 6;
        const molesPerRound = 3; // 每次冒出3隻地鼠 (1對2錯)

        function prepareGame() {
            const inputText = document.getElementById('word-input').value.trim();
            const errorMsg = document.getElementById('error-msg');
            
            if (!inputText) {
                errorMsg.textContent = "請輸入詞語和解釋！";
                errorMsg.style.display = "block";
                return;
            }

            const lines = inputText.split('\n');
            wordData = [];

            lines.forEach((line) => {
                const parts = line.split(/[:：\-—]/);
                if (parts.length >= 2) {
                    const word = parts[0].trim();
                    const clue = parts.slice(1).join('：').trim();
                    if (word.length > 0 && clue.length > 0) {
                        wordData.push({ word: word, clue: clue });
                    }
                }
            });

            if (wordData.length < 4) {
                errorMsg.textContent = "請至少輸入 4 組詞語，不然干擾選項不夠玩喔！";
                errorMsg.style.display = "block";
                return;
            }

            errorMsg.style.display = "none";
            timeLeft = parseInt(document.getElementById('time-limit').value);
            
            // 切換畫面，顯示開始彈窗
            document.getElementById('setup-view').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            
            document.getElementById('modal-title').textContent = "準備開始！";
            document.getElementById('modal-title').style.color = "#2e7d32";
            document.getElementById('modal-desc').innerHTML = "看清楚上方的解釋，打擊對應的詞語地鼠！<br><span style='color:#4caf50;font-weight:bold'>打對 +10 分</span>，<span style='color:#f44336;font-weight:bold'>打錯扣 5 分</span>。";
            document.getElementById('start-btn').textContent = "開始遊戲";
            document.getElementById('start-overlay').style.display = 'flex';
        }

        function startGame() {
            document.getElementById('start-overlay').style.display = 'none';
            score = 0;
            timeLeft = parseInt(document.getElementById('time-limit').value);
            isPlaying = true;
            
            updateScoreBoard();
            
            // 開始倒數計時
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                updateScoreBoard();
                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);

            nextQuestion();
        }

        function nextQuestion() {
            if (!isPlaying) return;
            
            // 隨機抽選一個題目
            currentTarget = wordData[Math.floor(Math.random() * wordData.length)];
            document.getElementById('clue-display').innerHTML = `🔍 尋找：<br><span style="color:#1565c0">${currentTarget.clue}</span>`;
            
            popMoles();
        }

        function popMoles() {
            if (!isPlaying) return;
            hideAllMoles();

            // 準備選項：1 個正確，2 個錯誤
            let options = [currentTarget.word];
            
            // 抽出 2 個不同的干擾選項
            let wrongOptions = wordData.filter(item => item.word !== currentTarget.word);
            // 打亂干擾選項
            wrongOptions.sort(() => Math.random() - 0.5);
            options.push(wrongOptions[0].word);
            options.push(wrongOptions[1].word);

            // 打亂選項順序
            options.sort(() => Math.random() - 0.5);

            // 隨機選 3 個地洞
            let holes = [0, 1, 2, 3, 4, 5];
            holes.sort(() => Math.random() - 0.5);
            activeMoles = holes.slice(0, molesPerRound);

            // 把詞語放進地鼠並冒出來
            activeMoles.forEach((holeIndex, i) => {
                const mole = document.getElementById(`mole-${holeIndex}`);
                mole.innerHTML = `<span>${options[i]}</span>`; // 綁定文字
                mole.dataset.word = options[i]; // 記錄這隻地鼠的字
                
                // 移除之前的特效狀態
                mole.classList.remove('hit-correct', 'hit-wrong');
                
                // 冒出來
                setTimeout(() => {
                    if (isPlaying) mole.classList.add('up');
                }, Math.random() * 300); // 讓地鼠冒出來的時間有一點點參差不齊
            });

            // 設定地鼠縮回去的時間 (2.5秒內沒打中就會換位子繼續同一題)
            clearTimeout(moleTimer);
            moleTimer = setTimeout(() => {
                if (isPlaying) popMoles(); // 沒打中，換個洞繼續冒出來
            }, 2500);
        }

        function hideAllMoles() {
            for (let i = 0; i < totalHoles; i++) {
                document.getElementById(`mole-${i}`).classList.remove('up');
            }
        }

        function whack(holeIndex) {
            // 防止觸控和點擊事件重複觸發
            if (event.type === 'touchstart') {
                event.preventDefault(); 
            }

            if (!isPlaying) return;
            const mole = document.getElementById(`mole-${holeIndex}`);
            
            // 如果地鼠不在上面，不能打
            if (!mole.classList.contains('up')) return;

            const hitWord = mole.dataset.word;

            if (hitWord === currentTarget.word) {
                // 打對了！
                clearTimeout(moleTimer); // 停止這輪的計時
                score += 10;
                mole.classList.add('hit-correct');
                mole.classList.remove('up');
                updateScoreBoard();
                
                // 延遲一下讓其他地鼠縮回去，然後出下一題
                setTimeout(() => {
                    nextQuestion();
                }, 400);

            } else {
                // 打錯了！
                score -= 5;
                mole.classList.add('hit-wrong');
                updateScoreBoard();
                
                // 錯的地鼠震動後縮回去
                setTimeout(() => {
                    mole.classList.remove('up');
                    mole.classList.remove('hit-wrong');
                }, 400);
            }
        }

        function updateScoreBoard() {
            document.getElementById('score').textContent = score;
            document.getElementById('time').textContent = timeLeft;
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            hideAllMoles();

            document.getElementById('modal-title').textContent = "時間到！";
            document.getElementById('modal-title').style.color = "#d32f2f";
            document.getElementById('modal-desc').innerHTML = `你的最終得分是：<br><span style="font-size:3rem; color:#f57c00; font-weight:bold;">${score}</span> 分`;
            document.getElementById('start-btn').textContent = "再玩一次";
            document.getElementById('start-overlay').style.display = 'flex';
        }

        function backToSetup() {
            isPlaying = false;
            clearInterval(gameTimer);
            clearTimeout(moleTimer);
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('game-view').style.display = 'none';
            document.getElementById('setup-view').style.display = 'block';
        }
    </script>
</body>
</html>

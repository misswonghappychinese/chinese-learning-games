        :root {

            --t2: #FFCA28; /* 第二聲: 黃 */

            --bg-color: #E3F2FD; --text: #37474F;

        body { font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; background-color: var(--bg-color); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden;}
        
        header { background: linear-gradient(135deg, #42A5F5, #1E88E5); width: 100%; padding: 20px 0; text-align: center; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom: 5px solid #FFCA28; position: relative; }
        h1 { margin: 0; font-size: 2.2rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }

        /* 返回遊戲大廳按鈕樣式 */
        .btn-lobby {
            position: absolute;
            top: 25px;
            right: 25px;
            background: #ffffff;
            color: #1E88E5;
            border: none;
            padding: 8px 16px;
            font-size: 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #B0BEC5;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            transition: transform 0.1s;
        }
        .btn-lobby:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #B0BEC5;
        }

        @media (max-width: 600px) {
            .btn-lobby {
                position: static;
                margin-top: 10px;
                margin-bottom: 5px;
            }
        }

        .container { width: 95%; max-width: 800px; margin: 30px auto; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 25px; box-sizing: border-box; }
        
        /* 教師出題區 */
        .setup-box { background: #F5F5F5; padding: 20px; border-radius: 12px; border-left: 6px solid #42A5F5; margin-bottom: 20px; }
        .setup-box h3 { color: #1E88E5; margin-top: 0; font-size: 1.3rem; border-bottom: 2px dashed #B0BEC5; padding-bottom: 10px;}
        textarea { width: 100%; padding: 12px; font-size: 1.2rem; border: 2px solid #CFD8DC; border-radius: 8px; box-sizing: border-box; margin-top: 8px; font-family: inherit; line-height: 1.6; resize: vertical;}
        .hint-block { background: #FFF9C4; padding: 12px; border-radius: 8px; font-size: 1rem; color: #F57F17; margin-bottom: 10px; border: 1px solid #FFF59D;}

        /* 遊玩區 */
        .play-area { display: none; flex-direction: column; align-items: center; width: 100%; }
        .level-info { font-size: 1.2rem; font-weight: bold; color: #546E7A; margin-bottom: 15px; background: #ECEFF1; padding: 5px 15px; border-radius: 20px;}

            background: white; border: 5px solid #1E88E5; border-radius: 25px;

            min-width: 250px;
